services:
  postgres:
    image: postgres:16-alpine
    container_name: color-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: color_game
      POSTGRES_USER: color_game
      POSTGRES_PASSWORD: color_game_password
    ports:
      - "5432:5432"
    volumes:
      - color-game-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U color_game -d color_game"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  color-game-postgres-data:
