name: Android

on:
  workflow_dispatch:
  push:
    branches:
      - feat/android-app
    paths:
      - "apps/mobile/**"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/android.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Sync Android project
        run: pnpm --filter @color-game/mobile sync:android

      - name: Test Android and build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tango-android-debug-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
