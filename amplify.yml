version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@11.1.3 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @color-game/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*

